function SocialFeed({ posts, currentUser, communityName, placeholder, onSubmitPost, onToggleLike, onToggleComments, onSubmitComment }) {
  const [newPost, setNewPost] = useState("");
  const [newComment, setNewComment] = useState({});
  const feedRef = useRef(null);

  const submitPost = () => {
    if (!newPost.trim()) return;
    onSubmitPost(newPost.trim());
    setNewPost("");
  };

  const toggleLike = (id) => onToggleLike(id);

  const toggleComments = (id) => onToggleComments(id);

  const submitComment = (postId) => {
    const text = newComment[postId]?.trim();
    if (!text) return;
    onSubmitComment(postId, text);
    setNewComment(prev => ({ ...prev, [postId]: "" }));
  };

  return (
    <div>
      {/* Caixa de novo post */}
      <div style={{ background: "#fff", borderRadius: 20, padding: 16, boxShadow: G.shadow, border: `1px solid ${G.border}`, marginBottom: 14 }}>
        <div style={{ display: "flex", gap: 10, marginBottom: 10 }}>
          <div style={{ width: 36, height: 36, borderRadius: "50%", background: G.primaryDim, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 18, flexShrink: 0 }}>{currentUser.avatar}</div>
          <textarea
            value={newPost}
            onChange={e => setNewPost(e.target.value)}
            placeholder={placeholder || `Compartilhe sua experiência em ${communityName}...`}
            rows={3}
            style={{ flex: 1, background: G.surfaceAlt, border: `1.5px solid ${G.border}`, borderRadius: 14, padding: "10px 14px", color: G.text, fontSize: 14, outline: "none", resize: "none", fontFamily: "'Nunito',sans-serif", lineHeight: 1.5 }}
            onFocus={e => e.target.style.border = `1.5px solid ${G.accent}`}
            onBlur={e => e.target.style.border = `1.5px solid ${G.border}`}
          />
        </div>
        <div style={{ display: "flex", justifyContent: "flex-end" }}>
          <Btn onClick={submitPost} disabled={!newPost.trim()} style={{ padding: "9px 20px", fontSize: 13 }}>Publicar ✨</Btn>
        </div>
      </div>

      {/* Posts */}
      {posts.map((p, i) => (
        <div key={p.id} className={p.isNew ? "fadeUp" : ""} style={{ background: "#fff", borderRadius: 20, padding: 16, boxShadow: G.shadow, border: `1px solid ${G.border}`, marginBottom: 12, transition: "all 0.2s" }}>
          {/* Header do post */}
          <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 10 }}>
            <div style={{ width: 38, height: 38, borderRadius: "50%", background: G.primaryDim, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 18, flexShrink: 0 }}>{p.avatar}</div>
            <div style={{ flex: 1 }}>
              <div style={{ fontWeight: 800, fontSize: 14 }}>{p.user}</div>
              <div style={{ fontSize: 11, color: G.textMuted }}>{p.time} atrás</div>
            </div>
            {p.user === currentUser.name && (
              <span style={{ fontSize: 11, background: G.primaryDim, color: G.primary, padding: "2px 8px", borderRadius: 10, fontWeight: 700 }}>Você</span>
            )}
          </div>

          {/* Texto */}
          <div style={{ fontSize: 14, color: G.text, lineHeight: 1.6, marginBottom: 12 }}>{p.text}</div>

          {/* Ações */}
          <div style={{ display: "flex", gap: 4, borderTop: `1px solid ${G.border}`, paddingTop: 10 }}>
            <button onClick={() => toggleLike(p.id)} style={{ display: "flex", alignItems: "center", gap: 6, background: p.liked ? G.roseDim : "transparent", border: `1px solid ${p.liked ? G.rose + "50" : G.border}`, borderRadius: 10, padding: "6px 12px", cursor: "pointer", fontSize: 13, fontWeight: 700, color: p.liked ? G.rose : G.textMuted, transition: "all 0.2s", fontFamily: "'Nunito',sans-serif" }}>
              {p.liked ? "❤️" : "🤍"} {p.likes}
            </button>
            <button onClick={() => toggleComments(p.id)} style={{ display: "flex", alignItems: "center", gap: 6, background: p.showComments ? G.accentDim : "transparent", border: `1px solid ${p.showComments ? G.accent + "50" : G.border}`, borderRadius: 10, padding: "6px 12px", cursor: "pointer", fontSize: 13, fontWeight: 700, color: p.showComments ? G.accent : G.textMuted, transition: "all 0.2s", fontFamily: "'Nunito',sans-serif" }}>
              💬 {p.comments.length}
            </button>
            <button style={{ display: "flex", alignItems: "center", gap: 6, background: "transparent", border: `1px solid ${G.border}`, borderRadius: 10, padding: "6px 12px", cursor: "pointer", fontSize: 13, fontWeight: 700, color: G.textMuted, marginLeft: "auto", fontFamily: "'Nunito',sans-serif" }}>
              ↗️ Compartilhar
            </button>
          </div>

          {/* Comentários */}
          {p.showComments && (
            <div className="fadeIn" style={{ marginTop: 12, paddingTop: 12, borderTop: `1px solid ${G.border}` }}>
              {p.comments.map((c, ci) => (
                <div key={ci} style={{ display: "flex", gap: 8, marginBottom: 10 }}>

              <div style={{ display: "flex", gap: 8, marginTop: 6 }}>

                  onChange={e => setNewComment(prev => ({ ...prev, [p.id]: e.target.value }))}

                  placeholder="Escreva um comentário..."
                  style={{ flex: 1, background: G.surfaceAlt, border: `1.5px solid ${G.border}`, borderRadius: 12, padding: "8px 12px", fontSize: 13, outline: "none", fontFamily: "'Nunito',sans-serif" }}
                  onFocus={e => e.target.style.border = `1.5px solid ${G.accent}`}
                  onBlur={e => e.target.style.border = `1.5px solid ${G.border}`}
                />
                <button onClick={() => submitComment(p.id)} style={{ width: 34, height: 34, borderRadius: 10, border: "none", background: `linear-gradient(135deg,${G.primary},${G.accent})`, cursor: "pointer", fontSize: 14, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>➤</button>
              </div>
            </div>
          )}
        </div>
      ))}
    </div>
  );
}

function CommunityFeedScreen({ item, mod, onBack, currentUser }) {
  const key = `${mod.label}-${item.name}`.replace(/\//g, "-");
  const [dbPosts, setDbPosts] = useState(null); // null = carregando

  useEffect(() => {
    if (!window.db) { setDbPosts([]); return; }
    let unsub = () => {};
    window.authReady.then(() => {
      const colRef = window.db.collection("bagagens_posts").doc(key).collection("posts");

      unsub = colRef.orderBy("createdAt", "desc").onSnapshot(
        snap => setDbPosts(snap.docs.map(d => ({ id: d.id, ...d.data() }))),
        () => setDbPosts([])
      );
    });
    return () => unsub();
  }, [key]);

  const [openComments, setOpenComments] = useState({});

  const posts = (dbPosts || []).map(p => ({
    id: p.id,
    user: p.user, avatar: p.avatar, text: p.text, time: "agora",
    likes: (p.likedBy?.length || 0) + (p.likesSeed || 0),
    liked: (p.likedBy || []).includes(currentUser.uid),
    comments: p.comments || [],
    showComments: !!openComments[p.id],
  }));

  const colRef = () => window.db.collection("bagagens_posts").doc(key).collection("posts");

  const handleSubmitPost = (text) => {
    if (!window.db) return;
    window.authReady.then(() => colRef().add({
      user: currentUser.name, avatar: currentUser.avatar, text,
      likedBy: [], likesSeed: 0, comments: [],
      createdAt: firebase.firestore.FieldValue.serverTimestamp(),
    }).catch(() => {}));
  };

  const handleToggleLike = (id) => {
    if (!window.db) return;
    const target = (dbPosts || []).find(p => p.id === id);
    const already = (target?.likedBy || []).includes(currentUser.uid);
    window.authReady.then(() => colRef().doc(id).update({
      likedBy: already
        ? firebase.firestore.FieldValue.arrayRemove(currentUser.uid)
        : firebase.firestore.FieldValue.arrayUnion(currentUser.uid),
    }).catch(() => {}));
  };

  const handleToggleComments = (id) => {
    setOpenComments(prev => ({ ...prev, [id]: !prev[id] }));
  };

  const handleSubmitComment = (id, text) => {
    if (!window.db) return;
    window.authReady.then(() => colRef().doc(id).update({
      comments: firebase.firestore.FieldValue.arrayUnion({ user: currentUser.name, avatar: currentUser.avatar, text }),
    }).catch(() => {}));
  };

  return (
    <div style={{ minHeight: "100vh", display: "flex", flexDirection: "column", background: G.bgGrad }}>
      <style>{css}</style>
      <div style={{ background: `linear-gradient(135deg,${G.primary} 0%,${G.accent} 100%)`, padding: "48px 20px 24px", position: "relative", overflow: "hidden" }}>
        <div style={{ position: "absolute", top: -40, right: -40, width: 160, height: 160, borderRadius: "50%", background: "rgba(255,255,255,0.07)" }} />
        <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 14 }}><BackBtn onClick={onBack} /></div>
        <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
          <div style={{ width: 48, height: 48, borderRadius: 14, background: "rgba(255,255,255,0.2)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 24 }}>{item.icon}</div>
          <div>
            <div style={{ color: "#fff", fontWeight: 800, fontSize: 20 }}>{item.name}</div>
            <div style={{ color: "rgba(255,255,255,0.75)", fontSize: 13 }}>⬤ {item.active} pessoas online agora</div>
          </div>
        </div>
      </div>

      <div style={{ flex: 1, overflowY: "auto", padding: "16px 18px 24px" }}>
        {item.link && (
          <a href={item.link} target="_blank" rel="noopener noreferrer" style={{ textDecoration: "none" }}>
            <div className="fadeUp" style={{ background: `linear-gradient(135deg,${G.primary}14,${G.accent}10)`, borderRadius: 18, padding: "14px 16px", border: `1.5px solid ${G.primary}22`, display: "flex", alignItems: "center", gap: 12, marginBottom: 14, cursor: "pointer" }}>
              <div style={{ fontSize: 24 }}>{item.icon}</div>
              <div style={{ flex: 1 }}>
                <div style={{ fontWeight: 800, fontSize: 13, color: G.primary }}>{item.linkLabel || "Site oficial"}</div>
                <div style={{ color: G.textMuted, fontSize: 11, marginTop: 1 }}>Fonte oficial do governo · abre em nova aba</div>
              </div>
              <div style={{ color: G.primary, fontSize: 18 }}>↗</div>
            </div>
          </a>
        )}
        {mod.label === "Espiritualidade" && <SpiritualContent item={item} />}
        {dbPosts === null ? (
          <div style={{ textAlign: "center", color: G.textMuted, fontSize: 13, padding: "24px 0" }}>Carregando conversas...</div>
        ) : (
          <SocialFeed
            posts={posts}
            currentUser={currentUser}
            communityName={item.name}
            placeholder={item.name === "Correntes de Oração" ? "Deixe seu pedido de oração, por você ou por alguém querido..." : undefined}
            onSubmitPost={handleSubmitPost}
            onToggleLike={handleToggleLike}
            onToggleComments={handleToggleComments}
            onSubmitComment={handleSubmitComment}
          />
        )}
      </div>
    </div>
  );
}

// ── Tela 3: Home Principal ────────────────────────────────────────────────────
function HomeScreen({ onOpenModule, currentUser }) {
  const [message, setMessage] = useState("");
  const [chat, setChat] = useState([
    { from: "ai", text: "Oi 🌿 Eu estou aqui. O que está pesando no seu coração hoje?" }
  ]);
  const [isLoading, setIsLoading] = useState(false);
  const chatRef = useRef(null);

  useEffect(() => {
    if (chatRef.current) chatRef.current.scrollTop = chatRef.current.scrollHeight;
  }, [chat, isLoading]);

  // Checagem de crise: SEMPRE local, nunca depende de rede/API, e tem prioridade sobre tudo.
  const CRISIS_REPLY = "Obrigado por compartilhar isso comigo — isso exigiu muita coragem. Esse peso é grande demais para carregar sozinho. Por favor, procure o CVV agora: ligue 188 (24h, gratuito) ou acesse cvv.org.br. Você merece apoio profissional de verdade. Estou aqui com você. 💙";
  const isCrisisMessage = (msg) => {
    const m = msg.toLowerCase();
    return m.includes("suicid") || m.includes("me matar") || m.includes("não quero mais viver") || m.includes("nao quero mais viver") || m.includes("acabar com tudo") || m.includes("acabar com a minha vida");
  };

  const getAIResponse = (msg) => {
    const m = msg.toLowerCase();
    if (m.includes("ansios") || m.includes("ansiedade") || m.includes("nervos") || m.includes("agitad"))
      return "Respira fundo comigo. Essa bagagem da ansiedade pesa muito, mas você não precisa carregar sozinho. Notei que você está sentindo isso agora — quer que eu te apresente pessoas que entendem exatamente o que você está vivendo na nossa comunidade de Ansiedade? 💨";
    if (m.includes("deprim") || m.includes("depress") || m.includes("triste") || m.includes("choran") || m.includes("choro"))
      return "Eu ouço você, e sinto o peso do que você está carregando. Às vezes a tristeza parece uma mala que nunca esvazia... mas ela esvazia sim. Tem muitas pessoas aqui que já estiveram nesse lugar e voltaram para contar como saíram. Quer conhecê-las? 🌧️💙";
    if (m.includes("sozinho") || m.includes("sozinha") || m.includes("ninguém") || m.includes("nao entend") || m.includes("não entend"))
      return "Você acabou de dar um passo muito corajoso ao abrir essa bagagem. E olha — você não está mais sozinho. Temos comunidades inteiras de pessoas que sentem exatamente isso. Posso te levar até elas agora? 🤝";
    if (m.includes("doença") || m.includes("doente") || m.includes("dor") || m.includes("tratamento") || m.includes("médico") || m.includes("remedio"))
      return "Entendo como é difícil lidar com isso no dia a dia. Às vezes a maior ajuda vem de quem já passou pelo mesmo. Temos comunidades de Enfermidades aqui com pessoas que podem compartilhar experiências reais sobre tratamentos, custos e o que funcionou para elas. Quer explorar? 🏥";
    if (m.includes("fé") || m.includes("deus") || m.includes("oraç") || m.includes("rezar") || m.includes("espiritualidade") || m.includes("espiritual"))
      return "A fé é um dos pilares mais poderosos na jornada de cura. Temos um espaço especial aqui no Bagagens dedicado à espiritualidade — correntes de oração, meditação e fortalecimento interior. Muitas pessoas encontraram alívio por lá. 🙏✨";
    if (m.includes("oi") || m.includes("olá") || m.includes("bom dia") || m.includes("boa tarde") || m.includes("boa noite"))
      return "Oi! Que bom ter você aqui 🌿 O Bagagens é o seu espaço para abrir a mala e respirar. Como você está se sentindo hoje? Pode falar à vontade.";
    if (m.includes("obrigad") || m.includes("ajudou") || m.includes("melhor"))
      return "Fico muito feliz em saber disso! 💜 Lembre-se: você tem uma comunidade inteira aqui torcendo por você. Cada passo conta. Continue se cuidando!";
    if (m.includes("cansad") || m.includes("esgotad") || m.includes("burnout") || m.includes("estressad"))
      return "Esse cansaço que você sente vai fundo, né? Não é fraqueza — é sinal de que você tem dado muito de si. Às vezes a mala precisa ser esvaziada antes de seguir viagem. Temos pessoas na comunidade de Burnout que entendem isso na pele. Quer conversar com elas? 🔥";
    if (m.includes("medo") || m.includes("preocup") || m.includes("assustado") || m.includes("incert"))
      return "Medo e incerteza fazem parte da jornada, mas não precisam ser os únicos companheiros. Você já deu um passo importante ao reconhecer o que sente. Aqui no Bagagens tem gente que já carregou esse mesmo peso e pode caminhar ao seu lado. 🌅";
    const respostas = [
      "Obrigado por compartilhar isso comigo. Cada história que você traz aqui é única, e eu quero entender melhor. Pode me contar mais sobre o que está vivendo? 🌿",
      "Eu ouço você. Às vezes só o fato de colocar em palavras já alivia um pouco essa bagagem. Tem alguém específico na sua vida com quem você consegue conversar sobre isso? 💙",
      "Isso que você disse é muito importante. Saiba que aqui no Bagagens você nunca está sozinho — tem uma comunidade inteira pronta para caminhar junto. Quer que eu te mostre quem mais está passando por algo parecido? 🤝",
      "Sinto o peso do que você está carregando. A gente não precisa resolver tudo de uma vez — às vezes é um passo de cada vez. O que você acha de começarmos por escrever três coisas que estão pesando mais hoje? ✍️",
    ];
    return respostas[Math.floor(Math.random() * respostas.length)];
  };

  const sendMessage = async () => {
    if (!message.trim() || isLoading) return;
    const userMsg = message.trim();
    setChat(c => [...c, { from: "user", text: userMsg }]);
    setMessage("");
    setIsLoading(true);

    // Crise: resposta imediata e local, nunca espera por rede.
    if (isCrisisMessage(userMsg)) {
      setTimeout(() => {
        setChat(c => [...c, { from: "ai", text: CRISIS_REPLY }]);
        setIsLoading(false);
      }, 400);
      return;
    }

    try {
      const res = await fetch("/api/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: userMsg }),
      });
      if (!res.ok) throw new Error("api indisponível");
      const data = await res.json();
      if (!data.reply) throw new Error("resposta vazia");
      setChat(c => [...c, { from: "ai", text: data.reply }]);
    } catch (e) {
      // Fallback: IA local por palavras-chave, enquanto /api/chat não está configurada
      await new Promise(r => setTimeout(r, 900 + Math.random() * 600));
      setChat(c => [...c, { from: "ai", text: getAIResponse(userMsg) }]);
    } finally {
      setIsLoading(false);
    }
  };

  const modules = [
    { key: "psicologicos", icon: "🧠", label: "Psicológicos", color: G.accent, bg: G.accentDim },
    { key: "enfermidades", icon: "🏥", label: "Enfermidades", color: G.blue, bg: G.blueDim },
    { key: "comunidades", icon: "👥", label: "Comunidades", color: G.teal, bg: G.tealDim },
    { key: "doacao", icon: "🩸", label: "Doação", color: G.rose, bg: G.roseDim },
    { key: "espiritualidade", icon: "🙏", label: "Espiritualidade", color: G.gold, bg: G.goldDim, full: true },
    { key: "pesquisa", icon: "📊", label: "Pesquisa de Saúde Pública", color: G.primary, bg: G.primaryDim, full: true },
  ];

  return (
    <div style={{ minHeight: "100vh", background: G.bgGrad, display: "flex", flexDirection: "column" }}>
      <style>{css}</style>
      <div style={{ background: `linear-gradient(135deg,${G.primary} 0%,${G.accent} 100%)`, padding: "48px 20px 24px", position: "relative", overflow: "hidden" }}>
        <div style={{ position: "absolute", top: -50, right: -50, width: 180, height: 180, borderRadius: "50%", background: "rgba(255,255,255,0.08)", pointerEvents: "none" }} />
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", position: "relative" }}>
          <BagagensLogo size={28} color="#fff" />
          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
            <div style={{ width: 7, height: 7, borderRadius: "50%", background: "#4ade80" }} className="pulse" />
            <div style={{ width: 38, height: 38, borderRadius: "50%", background: "rgba(255,255,255,0.2)", border: "2px solid rgba(255,255,255,0.3)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 18 }}>{currentUser.avatar}</div>
          </div>
        </div>
        <div style={{ marginTop: 16, background: "rgba(255,255,255,0.13)", borderRadius: 14, padding: "11px 15px", border: "1px solid rgba(255,255,255,0.22)" }}>
          <div style={{ color: "rgba(255,255,255,0.8)", fontSize: 11, fontWeight: 700, marginBottom: 2 }}>💬 Pensamento do dia</div>
          <div style={{ color: "#fff", fontSize: 13, fontStyle: "italic", fontWeight: 600 }}>"Às vezes a bagagem mais pesada é a que carregamos por dentro."</div>
        </div>
      </div>

      <div style={{ flex: 1, overflowY: "auto", padding: "18px 18px 10px" }}>
        {/* Chat IA */}
        <div className="fadeUp" style={{ marginBottom: 20 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 10 }}>
            <div style={{ width: 7, height: 7, borderRadius: "50%", background: G.teal }} className="pulse" />
            <span style={{ fontSize: 12, fontWeight: 800, color: G.textSub, textTransform: "uppercase", letterSpacing: 0.8 }}>Acolhimento Inteligente</span>
          </div>
          <div style={{ background: "#fff", borderRadius: 20, padding: 16, boxShadow: G.shadow, border: `1px solid ${G.border}` }}>
            <div ref={chatRef} style={{ maxHeight: 200, overflowY: "auto", marginBottom: 12, display: "flex", flexDirection: "column", gap: 10 }}>
              {chat.map((msg, i) => (
                <div key={i} style={{ display: "flex", justifyContent: msg.from === "user" ? "flex-end" : "flex-start", alignItems: "flex-end", gap: 8 }}>
                  {msg.from === "ai" && (
                    <div style={{ width: 26, height: 26, borderRadius: "50%", background: G.primaryDim, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 13, flexShrink: 0, fontFamily: "'Caveat',cursive", fontWeight: 700, color: G.primary }}>B</div>
                  )}
                  <div style={{ background: msg.from === "user" ? `linear-gradient(135deg,${G.primary},${G.accent})` : G.surfaceAlt, color: msg.from === "user" ? "#fff" : G.text, borderRadius: msg.from === "user" ? "18px 18px 4px 18px" : "18px 18px 18px 4px", padding: "10px 14px", fontSize: 13, lineHeight: 1.55, maxWidth: "80%", fontWeight: 500 }}>{msg.text}</div>
                </div>
              ))}
              {isLoading && (
                <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                  <div style={{ width: 26, height: 26, borderRadius: "50%", background: G.primaryDim, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 13, fontFamily: "'Caveat',cursive", fontWeight: 700, color: G.primary }}>B</div>
                  <div style={{ background: G.surfaceAlt, borderRadius: "18px 18px 18px 4px", padding: "12px 16px", display: "flex", gap: 4 }}>
                    {[0,1,2].map(i => <div key={i} style={{ width: 6, height: 6, borderRadius: "50%", background: G.accent, animation: `pulse 1.2s ${i*0.2}s infinite` }} />)}
                  </div>
                </div>
              )}
            </div>
            <div style={{ display: "flex", gap: 8 }}>
              <input value={message} onChange={e => setMessage(e.target.value)} onKeyDown={e => e.key === "Enter" && sendMessage()}
                placeholder="Como você está se sentindo hoje?"
                style={{ flex: 1, background: G.surfaceAlt, border: `1.5px solid ${G.border}`, borderRadius: 12, padding: "11px 14px", color: G.text, fontSize: 14, outline: "none", fontFamily: "'Nunito',sans-serif" }}
                onFocus={e => e.target.style.border = `1.5px solid ${G.accent}`}
                onBlur={e => e.target.style.border = `1.5px solid ${G.border}`}
              />
              <button onClick={sendMessage} disabled={isLoading} style={{ width: 44, height: 44, borderRadius: 12, border: "none", cursor: isLoading ? "not-allowed" : "pointer", background: isLoading ? G.border : `linear-gradient(135deg,${G.primary},${G.accent})`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 18, transition: "all 0.2s" }}>
                {isLoading ? "⏳" : "➤"}
              </button>
            </div>
          </div>
        </div>

        {/* Módulos */}
        <div className="fadeUp" style={{ ...delay(100), marginBottom: 8 }}>
          <div style={{ fontSize: 12, fontWeight: 800, color: G.textSub, textTransform: "uppercase", letterSpacing: 0.8, marginBottom: 12 }}>Explorar</div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
            {modules.map((m, i) => (
              <div key={i} className="fadeUp" style={{ ...delay(150 + i * 60), gridColumn: m.full ? "1 / -1" : undefined }}>
                <div onClick={() => onOpenModule(m.key)} style={{ background: "#fff", borderRadius: 18, padding: m.full ? "14px 18px" : "18px 14px", boxShadow: G.shadow, border: `1px solid ${G.border}`, cursor: "pointer", display: "flex", alignItems: "center", gap: m.full ? 14 : undefined, flexDirection: m.full ? "row" : "column", justifyContent: m.full ? "flex-start" : "center", transition: "all 0.25s" }}
                  onMouseEnter={e => { e.currentTarget.style.transform = "translateY(-3px)"; e.currentTarget.style.boxShadow = G.shadowHover; }}
                  onMouseLeave={e => { e.currentTarget.style.transform = "translateY(0)"; e.currentTarget.style.boxShadow = G.shadow; }}
                >
                  <div style={{ width: m.full ? 40 : 48, height: m.full ? 40 : 48, borderRadius: 12, background: m.bg, display: "flex", alignItems: "center", justifyContent: "center", fontSize: m.full ? 20 : 24, flexShrink: 0, marginBottom: m.full ? 0 : 8 }}>{m.icon}</div>
                  <div style={{ textAlign: m.full ? "left" : "center", flex: m.full ? 1 : undefined }}>
                    <div style={{ fontWeight: 800, fontSize: m.full ? 14 : 13, color: G.text }}>{m.label}</div>
                    {m.full && <div style={{ color: G.textMuted, fontSize: 12, marginTop: 1 }}>Toque para explorar</div>}
                  </div>
                  {m.full && <div style={{ color: G.textMuted, fontSize: 20 }}>›</div>}
                </div>
              </div>
            ))}
          </div>
        </div>

        {/* Diário */}
        <div className="fadeUp" style={{ ...delay(550), margin: "16px 0 20px" }}>
          <div style={{ background: `linear-gradient(135deg,${G.primary}14,${G.accent}10)`, borderRadius: 20, padding: "15px 16px", border: `1.5px solid ${G.primary}22`, display: "flex", alignItems: "center", gap: 14, cursor: "pointer" }}>
            <div style={{ fontSize: 30 }}>📘</div>
            <div style={{ flex: 1 }}>
              <div style={{ fontWeight: 800, fontSize: 14, color: G.primary }}>Diário de Insights</div>
              <div style={{ color: G.textMuted, fontSize: 12, marginTop: 2 }}>Sua jornada emocional desta semana está sendo registrada.</div>
            </div>
            <div style={{ color: G.primary, fontSize: 20 }}>›</div>
          </div>
        </div>
      </div>

      {/* Bottom Nav */}
      <div style={{ background: "#fff", borderTop: `1px solid ${G.border}`, padding: "10px 20px 24px", display: "flex", justifyContent: "space-around", boxShadow: "0 -4px 20px rgba(74,63,160,0.08)" }}>
        {[{ icon: "🏠", label: "Início", active: true }, { icon: "👥", label: "Comunidade" }, { icon: "📘", label: "Bagagem" }, { icon: "🔔", label: "Alertas" }, { icon: "👤", label: "Perfil" }].map((item, i) => (
          <div key={i} style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 3, cursor: "pointer", opacity: item.active ? 1 : 0.45 }}>
            <div style={{ fontSize: 20 }}>{item.icon}</div>
            <div style={{ fontSize: 10, fontWeight: 700, color: item.active ? G.primary : G.textMuted }}>{item.label}</div>
            {item.active && <div style={{ width: 4, height: 4, borderRadius: "50%", background: G.primary }} />}
          </div>
        ))}
      </div>
    </div>
  );
}

// ── App Root ──────────────────────────────────────────────────────────────────
function App() {
  const [screen, setScreen] = useState("auth");
  const [moduleKey, setModuleKey] = useState(null);
  const [selectedItem, setSelectedItem] = useState(null);
  const [selectedMod, setSelectedMod] = useState(null);
  const [currentUser, setCurrentUser] = useState({ name: "Visitante", avatar: "👤", uid: null });

  useEffect(() => {
    let uid = localStorage.getItem("bagagens_uid");
    if (!uid) {
      uid = "u_" + Math.random().toString(36).slice(2) + Date.now().toString(36);
      localStorage.setItem("bagagens_uid", uid);
    }
    setCurrentUser(prev => ({ ...prev, uid }));
  }, []);

  const openModule = key => { setModuleKey(key); setScreen("communityList"); };
  const selectItem = (item, mod) => { setSelectedItem(item); setSelectedMod(mod); setScreen("communityFeed"); };

  return (
    <>
      <style>{css}</style>
      {screen === "auth" && <AuthScreen onNext={() => setScreen("onboarding")} onSetUser={u => setCurrentUser(prev => ({ ...prev, ...u }))} />}
      {screen === "onboarding" && <OnboardingScreen onNext={() => setScreen("home")} />}
      {screen === "home" && <HomeScreen onOpenModule={openModule} currentUser={currentUser} />}
      {screen === "communityList" && <CommunityListScreen moduleKey={moduleKey} onBack={() => setScreen("home")} onSelectItem={selectItem} />}
      {screen === "communityFeed" && (
        <CommunityFeedScreen
          item={selectedItem} mod={selectedMod}
          onBack={() => setScreen("communityList")}
          currentUser={currentUser}
        />
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{ navigator.serviceWorker.register('/sw.js').catch(()=>{}); });
}
</script>
</body>
